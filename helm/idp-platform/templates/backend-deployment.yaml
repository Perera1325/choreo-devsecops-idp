apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          env:
            - name: PORT
              value: "{{ .Values.backend.service.port }}"
            - name: GEMINI_API_KEY
              value: "{{ .Values.backend.env.GEMINI_API_KEY }}"
            - name: OPENAI_API_KEY
              value: "{{ .Values.backend.env.OPENAI_API_KEY }}"
            - name: WSO2_IS_JWKS_URL
              value: "{{ .Values.backend.env.WSO2_IS_JWKS_URL }}"
            - name: WSO2_APIM_URL
              value: "{{ .Values.backend.env.WSO2_APIM_URL }}"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/deployments
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/deployments
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
